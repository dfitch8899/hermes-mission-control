name: Build validation

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: build-validation-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  next-build:
    name: Next.js production build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Disable Next.js telemetry
        run: npx next telemetry disable

      # Fast-fail on type errors before the slower production build —
      # surfaces TS errors with better output and shaves the feedback loop
      # for type-only mistakes from ~minutes to seconds.
      - name: Typecheck
        env:
          CI: true
        run: npm run typecheck

      # Lint after typecheck — catches React hook deps, dead code, unused
      # imports, and the `any` escape hatch. Configured to allow underscore-
      # prefixed unused params so signature-driven code (handlers, callbacks)
      # stays ergonomic. See eslint.config.mjs.
      - name: Lint
        env:
          CI: true
        run: npm run lint

      - name: Build app
        env:
          CI: true
          NEXT_TELEMETRY_DISABLED: 1
        run: npm run build
